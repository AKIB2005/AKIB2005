name: 🐍 Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"      # runs every day at midnight UTC
  workflow_dispatch:           # manual trigger from Actions tab
  push:
    branches:
      - main                   # also runs on every push to main

jobs:
  generate-snake:
    name: Generate snake animation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Generate snake SVGs (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: AKIB2005
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: ✅ Verify files were generated
        run: |
          echo "Generated files:"
          ls -lh dist/
          echo "Light SVG size: $(wc -c < dist/github-contribution-grid-snake.svg) bytes"
          echo "Dark  SVG size: $(wc -c < dist/github-contribution-grid-snake-dark.svg) bytes"

      - name: 🚀 Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: regenerate snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
